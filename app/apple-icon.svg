<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- Navy background -->
  <rect width="180" height="180" rx="40" fill="#163663"/>

  <!-- Three electron orbits: 0°, 60°, −60° -->
  <ellipse cx="90" cy="90" rx="65" ry="24"
    fill="none" stroke="#7ab8fc" stroke-width="7.5"/>
  <ellipse cx="90" cy="90" rx="65" ry="24"
    fill="none" stroke="#7ab8fc" stroke-width="7.5"
    transform="rotate(60 90 90)"/>
  <ellipse cx="90" cy="90" rx="65" ry="24"
    fill="none" stroke="#7ab8fc" stroke-width="7.5"
    transform="rotate(-60 90 90)"/>

  <!-- Nucleus -->
  <circle cx="90" cy="90" r="15" fill="white"/>

  <!-- Electron -->
  <circle cx="137" cy="76" r="8" fill="#7ab8fc"/>
</svg>
