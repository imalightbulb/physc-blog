<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Navy background with rounded corners -->
  <rect width="32" height="32" rx="7" fill="#163663"/>

  <!-- Three electron orbits: 0°, 60°, −60° — light accent blue for contrast -->
  <ellipse cx="16" cy="16" rx="11.5" ry="4.2"
    fill="none" stroke="#7ab8fc" stroke-width="1.35"/>
  <ellipse cx="16" cy="16" rx="11.5" ry="4.2"
    fill="none" stroke="#7ab8fc" stroke-width="1.35"
    transform="rotate(60 16 16)"/>
  <ellipse cx="16" cy="16" rx="11.5" ry="4.2"
    fill="none" stroke="#7ab8fc" stroke-width="1.35"
    transform="rotate(-60 16 16)"/>

  <!-- Nucleus -->
  <circle cx="16" cy="16" r="2.6" fill="white"/>

  <!-- Electron on the 0° orbit (top-right quadrant) -->
  <circle cx="24.3" cy="13.4" r="1.4" fill="#7ab8fc"/>
</svg>
